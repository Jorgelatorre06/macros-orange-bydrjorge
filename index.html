<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macros Orange</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8f8f8;
padding:20px;
color:#333;
}

.top{
background:linear-gradient(135deg,#ff8c00,#ff6b00);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(255,140,0,0.25);
margin-bottom:25px;
}

.logo{
font-size:55px;
margin-bottom:10px;
}

.top h1{
color:white;
font-size:28px;
font-weight:700;
margin-bottom:8px;
}

.top p{
color:white;
opacity:0.95;
}

.search-box{
position:relative;
margin-bottom:25px;
}

.search-box input{
width:100%;
padding:16px 16px 16px 50px;
border:none;
border-radius:18px;
font-size:15px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
outline:none;
}

.search-icon{
position:absolute;
left:18px;
top:15px;
font-size:18px;
opacity:0.6;
}

.card{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.text{
font-size:15px;
line-height:1.6;
margin-bottom:15px;
}

.copy{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff8c00,#ff6b00);
color:white;
font-weight:600;
cursor:pointer;
font-size:14px;
}

.copy:hover{
opacity:0.9;
}

.footer{
text-align:center;
margin-top:30px;
font-size:12px;
color:#777;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff7b00;
color:white;
padding:12px 20px;
border-radius:12px;
display:none;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

</style>
</head>
<body>

<div class="top">
<div class="logo">🍊</div>
<h1>MACROS DE LA FACCIÓN MÉDICA ORANGE</h1>
<p>Macros rápidas para copiar y pegar</p>
</div>

<div class="search-box">
<div class="search-icon">🔍</div>
<input type="text" placeholder="Buscar macro..." onkeyup="buscarMacro()">
</div>

<div id="macros"></div>

<div class="footer">
🩺 CREADO POR DR. JORGE • Discord: cocoa126
</div>

<div id="toast" class="toast">
✅ Macro copiada
</div>

<script>

const macros = [

"/do ¡TÁSER! ¡TÁSER! ¡TÁSER! PARA ESCAPAR DEL PELIGRO",

"/do TÁSER TÁSER DE ENTRENAMIENTO",

"/flobby Preparando vehículo médico.",

"/me Se activan sirenas y la unidad inicia desplazamiento en ruta a una llamada de emergencia.",

"/me Emergencia médica de ORANGE en lugar. Mantenga la calma y despeje el área",

"/do Se procede a la aplicación de botiquín y prestación de primeros auxilios",

"/do Administrar Medicamentos a Pacientes",

"/flobby (Código verde) Todas las llamadas de emergencia resueltas",

"/me Los Médicos no te ayudarán durante una balacera o en una zona de riesgo",

"/me ME PRESENTO ANTE UD. [RANGO],[ NOMBRE] SERVICIOS MÉDICOS ORANGE",

"/flobby (10-8) En Servicio Laboral",

"/flobby (10-7) Fuera de Servicio",

"/flobby (10-4) Entendido o De Acuerdo",

"/do MI CÁMARA CORPORAL ESTÁ GRABANDO",

"/flobby [UNIDAD MEDICA MOVIL] PREPARANDO VEHICULO MÉDICO, CARGANDO SUMINISTROS, EN RUTA A PUNTO DE ENTREGA.",

"/flobby [UNIDAD MEDICA MOVIL] EN PUNTO DE ENTREGA.",

"/flobby [UNIDAD MEDICA MOVIL] SE ATIENDE LLAMADA DE EMERGENCIA.",

"/flobby [UNIDAD MEDICA MOVIL] FINALIZANDO ENTREGA, DE REGRESO A GARAJE MEDICO.",

"/flobby En Camino a localización de entrega medicamentos.",

"/flobby Ignorar lo anunciado o lo siguiente.",

"/flobby ENTRENANDO A NUEVO ENFERMERO ROL/MACROS/TAREAS",

"/do SI YA FUE CURADO, POR FAVOR RETIRESE DEL HOSPITAL.",

"/do NO PODEMOS ATENDER PACIENTES CON ARMAS EN EL HOSPITAL POR FAVOR GUARDE SU ARMA.",

"/flobby SOLICITO UN ENTRENADOR PARA HACER RCP",

"/me DISCULPEN SI NO TENEMOS PASTILLAS O BOTIQUINES, DEBEMOS ESPERAR PARA RECARGAR",

"/flobby [CÓDIGO AZUL] SOLICITO APOYO POLICIAL EN EL HOSPITAL"

];

const container = document.getElementById("macros");

function mostrarMacros(lista){

container.innerHTML="";

lista.forEach(texto=>{

container.innerHTML += `

<div class="card">
<div class="text">${texto}</div>
<button class="copy" onclick="copiarTexto(\`${texto}\`)">
COPIAR MACRO
</button>
</div>

`;

});

}

mostrarMacros(macros);

function copiarTexto(texto){

navigator.clipboard.writeText(texto);

const toast = document.getElementById("toast");

toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2000);

}

function buscarMacro(){

const valor = document.querySelector("input").value.toLowerCase();

const filtradas = macros.filter(
m => m.toLowerCase().includes(valor)
);

mostrarMacros(filtradas);

}

</script>

</body>
</html>

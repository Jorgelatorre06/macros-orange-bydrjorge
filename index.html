<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Macros Orange</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f1a;
color:white;
padding:20px;
}

.top{
width:100%;
background:linear-gradient(135deg,#ff8800,#ff5e00);
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(255,136,0,0.3);
}

.top h1{
font-size:28px;
font-weight:700;
}

.top p{
margin-top:8px;
opacity:0.9;
}

.search{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:#151c2f;
color:white;
font-size:15px;
margin-bottom:25px;
}

.card{
background:#131a2c;
border-radius:20px;
padding:18px;
margin-bottom:18px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.03);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

.text{
font-size:15px;
line-height:1.5;
margin-bottom:15px;
color:#e8e8e8;
}

.copy{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ff8800,#ff5e00);
color:white;
font-weight:600;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

.copy:hover{
opacity:0.9;
}

.footer{
margin-top:35px;
text-align:center;
opacity:0.7;
font-size:14px;
}

.glow{
position:fixed;
width:300px;
height:300px;
background:orange;
filter:blur(140px);
opacity:0.15;
top:-100px;
right:-100px;
z-index:-1;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="top">
<h1>🟠 MACROS DE LA FRACCIÓN MÉDICA ORANGE</h1>
<p>Macros rápidas para copiar y pegar</p>
</div>

<input type="text" class="search" placeholder="Buscar macro..." onkeyup="buscarMacro()">

<div id="macros">

</div>

<div class="footer">
🩺 CREADO POR DR. JORGE
</div>

<script>

const macros = [

"/do ¡TÁSER! ¡TÁSER! ¡TÁSER! PARA ESCAPAR DEL PELIGRO",

"/do TÁSER TÁSER DE ENTRENAMIENTO",

"/flobby Preparando vehículo médico.",

"/me Se activan sirenas y la unidad inicia desplazamiento en ruta a una llamada de emergencia.",

"/me Emergencia médica de ORANGE en lugar. Mantenga la calma y despeje el área",

"/do Se procede a la aplicación de botiquín y prestación de primeros auxilios",

"/do Administrar Medicamentos a Pacientes",

"/flobby (Código verde) Todas las llamadas de emergencia resueltas",

"/me Los Médicos no te ayudarán durante una balacera o en una zona de riesgo",

"/me ME PRESENTO ANTE UD. [RANGO],[NOMBRE] SERVICIOS MÉDICOS ORANGE",

"/flobby (10-8) En Servicio Laboral",

"/flobby (10-7) Fuera de Servicio",

"/flobby (10-4) Entendido o De Acuerdo",

"/flobby En Camino a localización de entrega medicamentos.",

"/flobby Ignorar lo anunciado o lo siguiente.",

"/do MI CÁMARA CORPORAL ESTÁ GRABANDO",

"/do SI YA FUE CURADO, POR FAVOR RETIRESE DEL HOSPITAL.",

"/do NO PODEMOS ATENDER PACIENTES CON ARMAS EN EL HOSPITAL POR FAVOR GUARDE SU ARMA.",

"/flobby [CÓDIGO AZUL] SOLICITO APOYO POLICIAL EN EL HOSPITAL",

"/flobby PISO 2 CERRADO FAVOR DE NO SUBIR, REPRIMENDA POR MD 4.2 EN CASO DE INCUMPLIMIENTO",

"/flobby ENTRENANDO A NUEVO ENFERMERO ROL/MACROS/TAREAS",

"/flobby SOLICITO PERSONAL EN LOS MOSTRADORES POR FAVOR",

"/flobby SOLICITO UN ENTRENADOR PARA HACER RCP",

"/me DISCULPEN SI NO TENEMOS PASTILLAS O BOTIQUINES, DEBEMOS ESPERAR PARA RECARGAR",

"/flobby UNIFORMES VERDES, BLANCOS Y AZULES POR FAVOR DETRÁS DE MOSTRADOR"

];

const container = document.getElementById("macros");

function mostrarMacros(lista){

container.innerHTML="";

lista.forEach(texto=>{

container.innerHTML += `

<div class="card">

<div class="text">${texto}</div>

<button class="copy" onclick="copiarTexto('${texto.replace(/'/g,"\\'")}')">

COPIAR MACRO

</button>

</div>

`;

});

}

mostrarMacros(macros);

function copiarTexto(texto){

navigator.clipboard.writeText(texto);

alert("Macro copiada ✅");

}

function buscarMacro(){

const input = document.querySelector(".search").value.toLowerCase();

const filtradas = macros.filter(m=>m.toLowerCase().includes(input));

mostrarMacros(filtradas);

}

</script>

</body>
</html>
